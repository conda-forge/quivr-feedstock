{% set name = "quivr" %}
{% set version = "0.8.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/quivr-{{ version }}.tar.gz
  sha256: ead034e6bbb07c69381ba9c05ca67140e56c0a2a78f9c96df4ff367fb4a1653f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pdm-backend
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - pyarrow
    - numpy
    - mmh3
    - typing_extensions >=4.0.0

test:
  imports:
    - quivr
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: Container library for working with tabular Arrow data
  home: https://github.com/B612-Asteroid-Institute/quivr
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akoumjian
    - moeyensj
    - ntellis
    - KatKiker
